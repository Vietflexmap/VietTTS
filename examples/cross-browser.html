<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VietTTS 1.2.0 – Chrome, Firefox, Edge</title>
  <script src="https://cdn.jsdelivr.net/gh/Vietflexmap/VietTTS@main/dist/viettts.min.js"></script>
  <style>
    body{max-width:760px;margin:40px auto;padding:0 16px;font-family:system-ui,sans-serif;color:#172033}
    textarea,select,button{font:inherit}textarea,select{width:100%;padding:12px;margin:8px 0 16px;box-sizing:border-box}
    textarea{min-height:150px}button{padding:11px 16px;margin:4px;border:0;border-radius:9px;cursor:pointer}
    .speak{background:#b91c1c;color:#fff}.stop{background:#111827;color:#fff}pre{white-space:pre-wrap;background:#f1f5f9;padding:12px;border-radius:10px}
  </style>
</head>
<body>
  <h1>🇻🇳 VietTTS 1.2.0</h1>
  <p>Không chờ tải voice bên trong sự kiện click. Voice được nạp nền; nút đọc gọi <code>VietTTS.speak()</code> trực tiếp.</p>

  <label for="text">Nội dung tiếng Việt</label>
  <textarea id="text">Xin chào Việt Nam! Đây là kiểm tra giọng nói tiếng Việt trên Chrome, Firefox và Microsoft Edge.</textarea>

  <label for="voice">Giọng vi-VN</label>
  <select id="voice"><option value="">Tự động theo vi-VN</option></select>

  <label for="mode">Chế độ</label>
  <select id="mode">
    <option value="system">Giọng hệ thống (mặc định)</option>
    <option value="microsoft">Microsoft Voice (bật thủ công)</option>
  </select>

  <div>
    <button id="speak" class="speak">🔊 Đọc tiếng Việt</button>
    <button id="pause">⏸ Tạm dừng</button>
    <button id="resume">▶ Tiếp tục</button>
    <button id="stop" class="stop">⏹ Dừng</button>
  </div>

  <p id="status" role="status">Đang khởi tạo…</p>
  <pre id="diagnostic"></pre>

  <script>
    const $ = (id) => document.getElementById(id);

    VietTTS.warmup();

    async function refreshVoices() {
      await VietTTS.loadVoices(2500);
      const voices = VietTTS.getVoices({ lang: "vi", mode: $("mode").value });
      $("voice").innerHTML = '<option value="">Tự động theo vi-VN</option>';
      for (const voice of voices) {
        const option = document.createElement("option");
        option.value = voice.name;
        option.textContent = `${voice.name} (${voice.lang})${voice.localService ? " – cục bộ" : ""}`;
        $("voice").appendChild(option);
      }
      $("diagnostic").textContent = JSON.stringify(VietTTS.diagnose(), null, 2);
      $("status").textContent = voices.length
        ? `Đã tìm thấy ${voices.length} giọng tiếng Việt.`
        : "Trình duyệt chưa công bố voice vi-VN; vẫn thử phát bằng lang=vi-VN.";
    }

    $("speak").addEventListener("click", () => {
      const diagnostic = VietTTS.diagnose();
      $("status").textContent = "Đang đọc…";

      // Quan trọng: gọi speak trực tiếp trong click; không await loadVoices ở đây.
      VietTTS.speak($("text").value, {
        lang: "vi-VN",
        voice: $("voice").value,
        mode: $("mode").value,
        rate: 1,
        pitch: 1,
        volume: 1,
        maxChunkLength: 150,
        // Khi trình duyệt đã công bố danh sách voice, cấm rơi sang voice không phải tiếng Việt.
        // Firefox đôi khi trả [] dù voice hệ thống tồn tại, nên trường hợp [] vẫn thử bằng lang=vi-VN.
        strictVietnamese: diagnostic.voiceCount > 0
      }).then((result) => {
        $("status").textContent = `Đã đọc xong trên ${result.browser.name}.`;
      }).catch((error) => {
        $("status").textContent = `${error.code}: ${error.message}`;
        $("diagnostic").textContent = JSON.stringify(VietTTS.diagnose(), null, 2);
      });
    });

    $("pause").onclick = () => VietTTS.pause();
    $("resume").onclick = () => VietTTS.resume();
    $("stop").onclick = () => VietTTS.cancel();
    $("mode").addEventListener("change", refreshVoices);

    document.addEventListener("viettts:warning", (event) => {
      $("status").textContent = event.detail.message;
    });

    refreshVoices();
  </script>
</body>
</html>
